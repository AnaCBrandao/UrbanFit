
<div class="container">

  <mat-card class="card" appearance="outlined">
    <mat-card-header>

      <mat-card-title>
        <ng-container *ngIf="event$ | async as event; else loading">
          <ng-container *ngIf="event; else notFound">
            {{ event.name }}
          </ng-container>
        </ng-container>
      </mat-card-title>

    </mat-card-header>

    <img src="https://admin.cnnbrasil.com.br/wp-content/uploads/sites/12/2024/02/google-maps-e1707316052388.png" >

    <mat-card-content>
      <p>
        <strong>Data:</strong>
        {{ (event$ | async)?.date }}
      </p>

      <p>
        <strong>Horário:</strong>
        {{ (event$ | async)?.time }}
      </p>

      <p>
        <mat-icon aria-hidden="false" fontIcon="location_on"></mat-icon>
        <strong> Local:</strong>
        {{ (event$ | async)?.local }}
      </p>

      <!-- Descrição opcional -->
      <p *ngIf="(event$ | async)?.description">
        <strong>Descrição:</strong> {{ (event$ | async)?.description }}
      </p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button color="accent">
        Eu Vou!
      </button>
      <button mat-flat-button color="secondary">
        Cancelar Presença
      </button>
    </mat-card-actions>
  </mat-card>

  <!-- Templates auxiliares -->
  <ng-template #loading>
    <mat-spinner></mat-spinner>
  </ng-template>

  <ng-template #notFound>
    <p>Evento não encontrado.</p>
  </ng-template>
</div>
